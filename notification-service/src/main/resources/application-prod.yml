server:
  port: ${NOTIFICATION_SERVER_PORT}

spring:
  config:
    import:
      - optional:classpath:application-common.yml
      - optional:classpath:application-auth.yml
      - optional:classpath:application-jpa.yml
      - optional:classpath:application-kafka.yml
      - optional:classpath:application-redis.yml
      - optional:file:../.env[.properties]
  application:
    name: notification-service
  datasource:
    driver-class-name: ${DB_DRIVER_CLASS_NAME}
    url: ${NOTIFICATION_DB_URL}
    username: ${NOTIFICATION_DB_USERNAME}
    password: ${NOTIFICATION_DB_PASSWORD}
